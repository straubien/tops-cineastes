<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
@font-face {
  font-family: 'ImprintMTShadow';
  src: url('file:///home/user/tops-cineastes/fonts/imprint-mt-shadow.woff2') format('woff2');
}
@font-face {
  font-family: 'GoudyOldStyle';
  src: url('file:///home/user/tops-cineastes/fonts/GOUDOS.woff2') format('woff2');
}
@font-face {
  font-family: 'Cormorant Garamond';
  font-weight: 400;
  src: url('file:///tmp/claude-0/-home-user-tops-cineastes/37f0ec67-6956-5759-b93c-b24742b90b91/scratchpad/cg-400.ttf') format('truetype');
}
@font-face {
  font-family: 'Cormorant Garamond';
  font-weight: 600;
  src: url('file:///tmp/claude-0/-home-user-tops-cineastes/37f0ec67-6956-5759-b93c-b24742b90b91/scratchpad/cg-600.ttf') format('truetype');
}

:root {
  --bg: #f7f3ec;
  --rouge: #C0392B;
  --noir: #1a1a1a;
  --brun: #3d2b1a;
  --font-display: 'ImprintMTShadow', serif;
  --font-names: 'GoudyOldStyle', Georgia, serif;
  --font: 'Cormorant Garamond', Georgia, serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 2400px;
  height: 1260px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
  font-family: var(--font);
}

/* Grain papier */
body::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 200px;
}

/* Grand triangle noir — coin supérieur droit, étiré pour le format large */
.tri {
  position: absolute;
  top: -8%; right: -6%;
  width: 42%; height: 130%;
  background: var(--noir);
  clip-path: polygon(100% 0, 100% 100%, 0 0);
  z-index: 1;
}

/* Bande verticale gauche — noire */
.geo-v1 {
  position: absolute;
  top: 0; left: 0;
  width: 26px; height: 100%;
  background: var(--noir);
  z-index: 1;
}

/* Bande verticale fine rouge, côté droit */
.geo-v2 {
  position: absolute;
  top: 0; right: 48px;
  width: 9px; height: 65%;
  background: var(--rouge);
  z-index: 1;
}

/* Barre diagonale noire */
.geo-h1 {
  position: absolute;
  top: 18%; right: 2%;
  width: 560px; height: 18px;
  background: var(--noir);
  transform: rotate(-26deg);
  z-index: 1;
}

/* Blocs rouges inclinés — coin haut droit */
.geo-sq1 {
  position: absolute;
  top: 10%; right: 12%;
  width: 230px; height: 145px;
  background: var(--rouge);
  transform: rotate(-14deg);
  z-index: 2;
}
.geo-sq2 {
  position: absolute;
  top: 23%; right: 5%;
  width: 230px; height: 92px;
  background: var(--rouge);
  transform: rotate(-14deg);
  z-index: 2;
}

/* Trait horizontal médian gauche */
.geo-h2 {
  position: absolute;
  top: 50%; left: 26px;
  width: 110px; height: 3px;
  background: var(--rouge);
  transform: translateY(-50%);
  z-index: 1;
}

/* Bloc rouge bas gauche pour équilibrer le format large */
.geo-sq3 {
  position: absolute;
  bottom: 8%; left: 6%;
  width: 90px; height: 90px;
  background: var(--rouge);
  transform: rotate(12deg);
  z-index: 1;
  opacity: 0.9;
}

/* Centre */
.center {
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  padding-left: 60px;
  padding-right: 320px;
}

.title {
  font-family: var(--font-display);
  font-size: 72px;
  letter-spacing: 0.12em;
  color: var(--noir);
  line-height: 1;
  white-space: nowrap;
  transform: scale(1.65);
  margin-bottom: 56px;
}

.title .slash-block {
  display: inline-block;
  background: var(--rouge);
  color: var(--bg);
  padding: 0 12px;
  margin: 0 6px;
  font-size: 56px;
  font-weight: 400;
  vertical-align: middle;
  line-height: 1.2;
}

.sub {
  font-family: var(--font);
  font-size: 30px;
  font-weight: 600;
  font-style: normal;
  text-transform: uppercase;
  color: var(--brun);
  letter-spacing: 0.32em;
}

.sub strong {
  font-weight: 600;
  font-style: normal;
  color: var(--noir);
}
</style>
</head>
<body>
  <div class="tri"></div>
  <div class="geo-v1"></div>
  <div class="geo-v2"></div>
  <div class="geo-h1"></div>
  <div class="geo-sq1"></div>
  <div class="geo-sq2"></div>
  <div class="geo-h2"></div>
  <div class="geo-sq3"></div>

  <div class="center">
    <div class="title">TOPS<span class="slash-block">/</span>CINÉASTES</div>
    <div class="sub">INDEX COLLABORATIF</div>
  </div>
</body>
</html>
