<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>TOPS/CINÉASTES — Tests unitaires</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:800px;margin:2rem auto;padding:0 1rem}
  .pass{color:#1a6b3a} .fail{color:#A33025;font-weight:700}
  #summary{font-size:18px;margin:1rem 0;font-weight:700}
  ul{list-style:none;padding:0} li{padding:3px 0;border-bottom:1px solid #eee;font-size:14px}
</style>
</head>
<body>
<h1>Tests unitaires — utils.js / i18n.js</h1>
<div id="summary"></div>
<ul id="results"></ul>

<script src="utils.js?v=20260623"></script>
<script src="i18n.js?v=20260623"></script>
<script>
var results = [];
function assertEqual(label, actual, expected){
  var ok = JSON.stringify(actual) === JSON.stringify(expected);
  results.push({ label: label, ok: ok, actual: actual, expected: expected });
}

// escapeHtml
assertEqual('escapeHtml échappe les caractères spéciaux', escapeHtml('<b>"a" & \'b\'</b>'), '&lt;b&gt;&quot;a&quot; &amp; &#39;b&#39;&lt;/b&gt;');
assertEqual('escapeHtml gère une chaîne vide', escapeHtml(''), '');
assertEqual('escapeHtml gère undefined', escapeHtml(undefined), '');

// toTitleCase
assertEqual('toTitleCase met en majuscule la première lettre', toTitleCase('dupont'), 'Dupont');
assertEqual('toTitleCase applique les exceptions accentuées', toTitleCase('frederic'), 'Frédéric');

// getInitiales
assertEqual('getInitiales sur un nom complet', getInitiales('Jean Dupont'), 'JD');
assertEqual('getInitiales sur un nom à 3 mots', getInitiales('Jean Paul Dupont'), 'JD');
assertEqual('getInitiales sur un seul mot', getInitiales('Cinematheque'), 'CI');

// normStr
assertEqual('normStr retire les accents et met en minuscule', normStr('Éric Müller'), 'eric muller');

// getAvatarFilename
assertEqual('getAvatarFilename slugifie le nom', getAvatarFilename('Jean-Pierre Léaud'), 'jean-pierre-leaud.jpg');
assertEqual('getAvatarFilename gère une valeur vide', getAvatarFilename(''), 'avatar.jpg');

// formatContribNamePlain
assertEqual('formatContribNamePlain met en forme le prénom en casse titre', formatContribNamePlain('jean dupont'), 'Jean dupont');

// parseTopsBrut
assertEqual('parseTopsBrut parse une liste numérotée avec année', parseTopsBrut('1. Vertigo (1958)\n2. Psychose (1960)'), [
  { rang: 1, titre: 'Vertigo', annee: 1958 },
  { rang: 2, titre: 'Psychose', annee: 1960 }
]);
assertEqual('parseTopsBrut parse une ligne sans numéro ni année', parseTopsBrut('Citizen Kane'), [
  { rang: 1, titre: 'Citizen Kane', annee: null }
]);
assertEqual('parseTopsBrut ignore les lignes vides', parseTopsBrut('1. A\n\n2. B').length, 2);

// formatPresentation
assertEqual('formatPresentation convertit le markdown simple', formatPresentation('**gras** et *italique*'), '<strong>gras</strong> et <em>italique</em>');
assertEqual('formatPresentation convertit les retours à la ligne', formatPresentation('a\nb'), 'a<br>b');
assertEqual('formatPresentation échappe le HTML avant transformation', formatPresentation('<script>'), '&lt;script&gt;');

// friendlyError
assertEqual('friendlyError gère une erreur null', friendlyError(null), 'Une erreur est survenue.');
assertEqual('friendlyError détecte une session expirée', friendlyError({ message: 'JWT expired' }), 'Votre session a expiré. Merci de vous reconnecter.');
assertEqual('friendlyError détecte une violation RLS', friendlyError({ message: 'new row violates row-level security policy' }), 'Action non autorisée.');
assertEqual('friendlyError détecte une erreur réseau', friendlyError({ message: 'Failed to fetch' }), 'Problème de connexion. Vérifiez votre réseau et réessayez.');

// i18n — t()
assertEqual('t() retourne la clé brute si absente', t('clef_inexistante_xyz'), 'clef_inexistante_xyz');
assertEqual('t() résout une fonction avec un argument simple', t('mt_notif_proposal_approved', 'Jean Dupont'), "Votre suggestion de cinéaste « Jean Dupont » a été validée.");
assertEqual('t() résout une fonction avec un argument tableau', t('mt_notif_comment', ['Alice', 'Top Hitchcock']), 'Alice a commenté le top « Top Hitchcock ».');

// Rendu
var passCount = results.filter(function(r){ return r.ok; }).length;
document.getElementById('summary').innerHTML = passCount + ' / ' + results.length + ' tests réussis';
document.getElementById('summary').className = passCount === results.length ? 'pass' : 'fail';
var ul = document.getElementById('results');
results.forEach(function(r){
  var li = document.createElement('li');
  li.className = r.ok ? 'pass' : 'fail';
  li.textContent = (r.ok ? '✓ ' : '✗ ') + r.label + (r.ok ? '' : (' — attendu: ' + JSON.stringify(r.expected) + ', obtenu: ' + JSON.stringify(r.actual)));
  ul.appendChild(li);
});
</script>
</body>
</html>
