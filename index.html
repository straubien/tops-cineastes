<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOPS / CINEASTES</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── SPLASH ─────────────────────────────────────────────────── -->
<div class="splash" id="splash">
  <div class="splash-geo">
    <div class="splash-geo-v1"></div>
    <div class="splash-geo-v2"></div>
    <div class="splash-geo-h1"></div>
    <div class="splash-geo-sq1"></div>
    <div class="splash-geo-sq2"></div>
    <div class="splash-geo-h2"></div>
  </div>
  <div class="splash-center">
    <div class="splash-title">TOPS<span class="slash-block">/</span>CINÉASTES</div>
    <button class="splash-enter" id="btn-enter">Explorer l'index</button>
  </div>
</div>

<!-- ── SITE ───────────────────────────────────────────────────── -->
<div class="main-wrapper" id="main-wrapper">

  <!-- HEADER -->
  <header class="header">
    <div class="header-geo-bar">
      <div class="hgb-main"></div>
      <div class="hgb-red"></div>
      <div class="hgb-end"></div>
    </div>
    <div class="header-inner">
      <div class="logo" id="logo-home">
        TOPS<span class="slash-sq">/</span>CINÉASTES
      </div>
      <nav class="nav">
        <a id="nav-index" class="active">Index</a>
        <a id="nav-contributeurs">Contributeurs</a>
        <a id="nav-statistiques">Statistiques</a>
        <a id="nav-dark" title="Mode sombre">&#9681;</a>
      </nav>
    </div>
  </header>

  <div class="content">

    <!-- PAGE INDEX -->
    <div class="page visible" id="page-index">
      <div class="search-bar">
        <input type="text" placeholder="Rechercher un cinéaste…" id="search-input">
      </div>
      <div class="alpha-bar" id="alpha-bar"></div>
      <div class="list-count-bar">
        <div class="list-count" id="list-count"></div>
      </div>
      <div class="cineaste-list" id="cineaste-list"></div>
    </div>

    <!-- PAGE CONTRIBUTEURS -->
    <div class="page" id="page-contributeurs">
      <div class="list-header" style="margin-bottom:1.5rem">
        <div class="list-letter" style="font-size:44px;color:var(--text)">Contributeurs</div>
      </div>
      <div class="contrib-list" id="contrib-list"></div>
    </div>

    <!-- PAGE PROFIL -->
    <div class="page" id="page-profil">
      <div class="profil-header">
        <div class="profil-name" id="profil-name"></div>
        <div class="profil-name-line"></div>
        <div class="profil-stat" id="profil-stat"></div>
      </div>
      <div class="profil-block">
        <div class="profil-section-title">Cinéastes favoris</div>
        <div class="profil-favs-grid" id="profil-favs-grid"></div>
      </div>
      <div class="profil-block" id="profil-autres-cineaste-block">
        <div class="profil-section-title">Autres cinéastes appréciés</div>
        <div class="profil-autres-grid" id="profil-autres-cineaste"></div>
        <div style="text-align:center">
          <button class="profil-voir-plus" id="profil-autres-cineaste-btn">Voir tous les cinéastes ↓</button>
        </div>
      </div>
      <div class="profil-block" id="profil-films-coeur-block">
        <div class="profil-section-title">Films favoris</div>
        <div class="profil-films-list" id="profil-films-coeur"></div>
      </div>
      <div class="profil-block" id="profil-films-autres-block">
        <div class="profil-section-title">Autres films</div>
        <div class="profil-films-list" id="profil-films-autres"></div>
        <div style="text-align:center">
          <button class="profil-voir-plus" id="profil-films-autres-btn">Voir tous les films ↓</button>
        </div>
      </div>
      <div class="profil-block" id="profil-presentation-block" style="display:none">
        <div class="profil-presentation">
          <div class="profil-presentation-label">Présentation cinéphile</div>
          <div class="profil-presentation-text" id="profil-presentation-text"></div>
        </div>
      </div>
    </div>

    <!-- PAGE STATISTIQUES -->
    <div class="page" id="page-statistiques">
      <div class="list-header" style="margin-bottom:1.5rem">
        <div class="list-letter" style="font-size:44px;color:var(--text)">Statistiques</div>
      </div>
      <div class="stats-hero" id="stats-hero"></div>
      <div class="stats-secondary" id="stats-secondary"></div>
      <div class="ranking-section">
        <div class="ranking-title">Cinéastes les plus topés</div>
        <div id="ranking-cineastes"></div>
      </div>
    </div>

  </div><!-- /.content -->

  <!-- FICHE OVERLAY -->
  <div class="fiche-overlay" id="fiche-overlay">
    <div class="fiche" id="fiche-content"></div>
  </div>

  <!-- BOTTOM NAV (retour contributeurs depuis profil) -->
  <div class="bottom-nav" id="bottom-nav" style="display:none">
    <button class="bottom-back" id="btn-back-contrib" title="Retour aux contributeurs">&#8592; Contributeurs</button>
  </div>

  <!-- SCROLL TO TOP -->
  <button class="scroll-top" id="scroll-top" title="Remonter en haut">&#8593;</button>

</div><!-- /#main-wrapper -->

<script src="app.js"></script>

<script>
// ── Wiring des éléments statiques ────────────────────────────
// (uniquement des addEventListener — jamais d'onclick inline)

document.getElementById('btn-enter').addEventListener('click', function() {
  enterSite();
});

document.getElementById('logo-home').addEventListener('click', function() {
  navigate('index');
});

document.getElementById('nav-index').addEventListener('click', function() {
  navigate('index');
});

document.getElementById('nav-contributeurs').addEventListener('click', function() {
  navigate('contributeurs');
});

document.getElementById('nav-statistiques').addEventListener('click', function() {
  navigate('statistiques');
});

document.getElementById('nav-dark').addEventListener('click', function() {
  toggleDark();
});

document.getElementById('profil-autres-cineaste-btn').addEventListener('click', function() {
  toggleVoirPlus('cineaste');
});

document.getElementById('profil-films-autres-btn').addEventListener('click', function() {
  toggleVoirPlus('films');
});

document.getElementById('btn-back-contrib').addEventListener('click', function() {
  navigate('contributeurs');
});

document.getElementById('scroll-top').addEventListener('click', function() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

document.getElementById('fiche-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeFiche();
});

document.getElementById('search-input').addEventListener('input', function() {
  filterList();
});
</script>

</body>
</html>
