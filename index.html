<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOPS / CINÉASTES</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>

@font-face {
  font-family: 'GoudyOldStyle';
  src: url('fonts/GOUDOS.woff2') format('woff2');
  font-display: swap;
}
@font-face {
  font-family: 'ImprintMTShadow';
  src: url('fonts/imprint-mt-shadow.woff2') format('woff2');
  font-display: swap;
}


/* ── PALETTE MODE CLAIR (défaut) ─────────────────────────── */
:root {
  --bg:          #f7f3ec;
  --bg-subtle:   #ede8df;
  --bg-card:     #faf8f4;
  --rouge:       #8B1A2E;
  --rouge-dim:   #6e1524;
  --brun:        #3d2b1a;
  --brun-pale:   #7a6350;
  --text:        #111008;
  --text-dim:    #3d2b1a;
  --border:      #d0c8b8;
  --border-dim:  #ddd6c8;
  --border-dark: #e8e2d8;
  --tag-bg:      #ede8df;
  --tag-border:  #c8bfaf;
  --font:        'Cormorant Garamond', Georgia, serif;
  --font-names:  'GoudyOldStyle', Georgia, serif;
  --font-display:'ImprintMTShadow', serif;
}

/* ── PALETTE MODE SOMBRE ─────────────────────────────────── */
@media (prefers-color-scheme: dark) {
  :root {
    --bg:          #1a1714;
    --bg-subtle:   #201d1a;
    --bg-card:     #161310;
    --rouge:       #a85060;
    --rouge-dim:   #7a3a48;
    --brun:        #c8b89a;
    --brun-pale:   #7a6a58;
    --text:        #ede5d5;
    --text-dim:    #9a9080;
    --border:      #332d28;
    --border-dim:  #262018;
    --border-dark: #201c18;
    --tag-bg:      #201d18;
    --tag-border:  #332d20;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

a { text-decoration: none; color: inherit; }

/* ── HEADER ──────────────────────────────────────────────── */
.header {
  padding: 1.1rem 2.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
  border-bottom: 1px solid var(--border);
}
/* filet rouge sous le header */
.header::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 0; right: 0;
  height: 2px;
  background: var(--rouge);
  opacity: 0.7;
}

.logo {
  font-family: var(--font-display);
  font-size: 34px;
  font-weight: 400;
  font-variant: normal;
  letter-spacing: 0.1em;
  color: var(--rouge);
  cursor: pointer;
  transition: opacity 0.2s;
  line-height: 1;
}
.logo:hover { opacity: 0.8; }
.logo span {
  color: var(--brun-pale);
  margin: 0 5px;
  font-weight: 300;
  font-variant: normal;
}

.nav { display: flex; gap: 2rem; }
.nav a {
  font-family: var(--font);
  font-size: 21px;
  font-weight: 500;
  font-variant: small-caps;
  letter-spacing: 0.1em;
  color: var(--brun);
  cursor: pointer;
  transition: color 0.2s;
  position: relative;
  padding-bottom: 2px;
}
.nav a:hover { color: var(--rouge); }
.nav a.active { color: var(--rouge); }
.nav a.active::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0; right: 0;
  height: 1.5px;
  background: var(--rouge);
}

/* ── CONTENU ─────────────────────────────────────────────── */
.content {
  padding: 2.5rem;
  max-width: 980px;
  margin: 0 auto;
  width: 100%;
  flex: 1;
}

/* ── RECHERCHE ───────────────────────────────────────────── */
.search-bar { margin-bottom: 1.8rem; }
.search-bar input {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 18px;
  font-family: var(--font);
  font-size: 20px;
  font-style: italic;
  border-radius: 2px;
  width: 100%;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-bar input::placeholder { color: var(--brun-pale); }
.search-bar input:focus {
  border-color: var(--rouge);
  box-shadow: 0 0 0 2px rgba(181,41,28,0.08);
}

/* ── BARRE ALPHABÉTIQUE — 2 rangées de 13 ───────────────── */
.alpha-bar {
  display: grid;
  grid-template-columns: repeat(13, 1fr);
  gap: 4px 4px;
  margin-bottom: 2rem;
  padding-bottom: 1.8rem;
  border-bottom: 1px solid var(--border-dim);
}
.alpha-bar span {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
  color: var(--brun);
  cursor: pointer;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: var(--bg-card);
  transition: background 0.12s, color 0.12s, border-color 0.12s, box-shadow 0.12s;
  user-select: none;
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}
.alpha-bar span.has-data:hover {
  background: var(--bg-subtle);
  border-color: var(--brun-pale);
  color: var(--text);
}
.alpha-bar span.active {
  background: var(--bg);
  color: var(--rouge);
  border-color: var(--rouge);
  border-bottom: 2.5px solid var(--rouge);
  box-shadow: 0 2px 6px rgba(181,41,28,0.12);
  font-weight: 700;
}
.alpha-bar span.no-data {
  color: var(--border);
  background: transparent;
  border-color: var(--border-dark);
  box-shadow: none;
  cursor: default;
}

/* ── EN-TÊTE DE SECTION ──────────────────────────────────── */
.list-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 1rem;
}
.list-letter {
  font-family: var(--font-display);
  font-size: 64px;
  font-weight: 400;
  color: var(--rouge);
  line-height: 1;
  letter-spacing: 0.02em;
}
.list-count {
  font-family: var(--font);
  font-size: 17px;
  font-style: italic;
  color: var(--brun-pale);
}

/* ── LISTE DES CINÉASTES ─────────────────────────────────── */
.cineaste-list { display: flex; flex-direction: column; }
.cineaste-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 12px 8px;
  border-bottom: 1px solid var(--border-dark);
  cursor: pointer;
  transition: background 0.1s;
  border-radius: 2px;
}
.cineaste-row:hover { background: var(--bg-subtle); }
.cineaste-row:hover .c-name { color: var(--rouge); }
.c-name {
  font-family: var(--font-names);
  font-size: 26px;
  font-weight: 400;
  color: var(--text);
  transition: color 0.15s;
}
.c-name b { font-weight: 700; }
.c-dates {
  font-family: var(--font);
  font-style: italic;
  font-weight: 400;
  color: var(--brun);
  font-size: 20px;
  margin-left: 12px;
}
.c-badge {
  font-family: var(--font);
  font-size: 17px;
  font-style: italic;
  color: var(--brun-pale);
  background: var(--tag-bg);
  border: 1px solid var(--tag-border);
  padding: 2px 14px;
  border-radius: 2px;
  white-space: nowrap;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}

/* ── FICHE OVERLAY ───────────────────────────────────────── */
.fiche-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10,8,4,0.65);
  z-index: 200;
  overflow-y: auto;
  padding: 4rem 2rem;
}
.fiche-overlay.visible { display: flex; justify-content: center; align-items: flex-start; }
.fiche {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-top: 3px solid var(--rouge);
  border-radius: 2px;
  padding: 2.5rem;
  width: 100%;
  max-width: 700px;
  animation: fiche-in 0.2s ease-out;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
}
@keyframes fiche-in {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fiche-back {
  font-family: var(--font);
  font-size: 17px;
  font-style: italic;
  color: var(--brun-pale);
  cursor: pointer;
  margin-bottom: 2rem;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: color 0.15s;
}
.fiche-back:hover { color: var(--rouge); }
.fiche-name {
  font-family: var(--font-names);
  font-size: 40px;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.1;
}
.fiche-name b { font-weight: 700; }
.fiche-dates {
  font-family: var(--font);
  font-size: 20px;
  color: var(--brun);
  font-style: italic;
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border-dim);
}
.fiche-stat {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 2rem;
}
.fiche-stat-number {
  font-family: var(--font);
  font-size: 48px;
  font-weight: 300;
  color: var(--rouge);
  line-height: 1;
}
.fiche-stat-label {
  font-family: var(--font);
  font-size: 18px;
  font-style: italic;
  color: var(--brun-pale);
}
.fiche-section {
  font-family: var(--font);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--rouge);
  margin-bottom: 0.75rem;
}
.contrib-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.contrib-tag {
  font-family: var(--font);
  font-size: 16px;
  padding: 4px 16px;
  border: 1px solid var(--tag-border);
  border-radius: 2px;
  color: var(--brun);
  background: var(--tag-bg);
  transition: border-color 0.15s, color 0.15s;
  cursor: pointer;
}
.contrib-tag:hover { border-color: var(--rouge); color: var(--rouge); }
.fiche-fb-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border-dim);
  font-family: var(--font);
  font-size: 15px;
  font-style: italic;
  color: var(--brun-pale);
  transition: color 0.15s;
}
.fiche-fb-link:hover { color: var(--rouge); }


/* ── TOP 10 CONTRIBUTEURS ────────────────────────────────── */
.contrib-card-top {
  background: var(--bg-card);
  border: 2px solid var(--rouge);
  border-top: 4px solid var(--rouge);
  border-radius: 2px;
  padding: 1.25rem 1.5rem;
  cursor: pointer;
  transition: box-shadow 0.15s;
  box-shadow: 0 2px 10px rgba(139,26,46,0.12);
  position: relative;
}
.contrib-card-top:hover {
  box-shadow: 0 4px 20px rgba(139,26,46,0.22);
}
.contrib-rank-badge {
  position: absolute;
  top: 10px; right: 12px;
  font-family: var(--font-display);
  font-size: 13px;
  color: var(--rouge);
  letter-spacing: 0.05em;
  opacity: 0.7;
}

/* ── CONTRIBUTEURS ───────────────────────────────────────── */
.contrib-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 14px;
}
.contrib-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-top: 2px solid var(--border-dim);
  border-radius: 2px;
  padding: 1.25rem 1.5rem;
  cursor: pointer;
  transition: border-top-color 0.15s, box-shadow 0.15s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.contrib-card:hover {
  border-top-color: var(--rouge);
  box-shadow: 0 3px 12px rgba(0,0,0,0.1);
}
.contrib-card-name {
  font-family: var(--font-names);
  font-size: 26px;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 3px;
}
.contrib-card-name .contrib-prenom { color: var(--text); }
.contrib-card-name .contrib-nom { color: var(--rouge); font-weight: 700; }
.contrib-card-stat {
  font-family: var(--font-names);
  font-size: 20px;
  font-weight: 700;
  font-style: normal;
  color: var(--text);
  margin-bottom: 12px;
}
.contrib-card-favs {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding-top: 10px;
  border-top: 1px solid var(--border-dim);
}
.contrib-fav-item {
  font-family: var(--font-names);
  font-size: 17px;
  font-style: normal;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 7px;
}
.contrib-fav-item .heart { color: var(--rouge); font-style: normal; font-size: 11px; }

/* ── STATISTIQUES ────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 14px;
  margin-bottom: 3rem;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 1.4rem 1.5rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.stat-card-label {
  font-family: var(--font-names);
  font-size: 16px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 6px;
}
.stat-card-value {
  font-family: var(--font-names);
  font-size: 52px;
  font-weight: 700;
  color: var(--rouge);
  line-height: 1;
}
.ranking-section { margin-bottom: 3rem; }
.ranking-title {
  font-family: var(--font-names);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--text);
  margin-bottom: 1rem;
  padding-bottom: 0.6rem;
  border-bottom: 2px solid var(--border);
}
.ranking-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 10px 8px;
  border-bottom: 1px solid var(--border-dark);
  cursor: pointer;
  transition: background 0.1s;
  border-radius: 2px;
}
.ranking-row:hover { background: var(--bg-subtle); }
.ranking-rank {
  font-family: var(--font);
  font-size: 17px;
  color: var(--brun-pale);
  width: 34px;
  font-style: italic;
}
.ranking-name {
  font-family: var(--font-names);
  font-size: 22px;
  color: var(--text);
  flex: 1;
}
.ranking-name b { font-weight: 700; }
.ranking-value {
  font-family: var(--font-names);
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}

/* ── DIVERS ──────────────────────────────────────────────── */
.empty-msg {
  font-family: var(--font);
  font-style: italic;
  color: var(--brun-pale);
  font-size: 18px;
  padding: 2rem 0;
}
.footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem 2rem;
  text-align: center;
  font-family: var(--font-display);
  font-size: 18px;
  letter-spacing: 0.15em;
  color: var(--text);
}

.page { display: none; }
.page.visible { display: block; }

@media (max-width: 640px) {
  .header { flex-direction: column; gap: 0.8rem; padding: 1rem 1.25rem; }
  .logo { font-size: 26px; }
  .nav { gap: 1.2rem; }
  .content { padding: 1.25rem; }
  .alpha-bar { grid-template-columns: repeat(13, 1fr); gap: 3px; }
  .alpha-bar span { font-size: 15px; height: 36px; }
  .fiche-overlay { padding: 1rem; }
  .fiche { padding: 1.5rem; }
  .fiche-name { font-size: 30px; }
  .list-letter { font-size: 48px; }
  .c-name { font-size: 21px; }
  .c-dates { font-size: 17px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo" onclick="navigate('index')">TOPS<span>/</span>CINEASTES</div>
  <div class="nav">
    <a onclick="navigate('index')" id="nav-index" class="active">Index</a>
    <a onclick="navigate('contributeurs')" id="nav-contributeurs">Contributeurs</a>
    <a onclick="navigate('statistiques')" id="nav-statistiques">Statistiques</a>
  </div>
</div>

<div class="content">
  <div class="page visible" id="page-index">
    <div class="search-bar">
      <input type="text" placeholder="Rechercher un cinéaste…" id="search-input" oninput="filterList()">
    </div>
    <div class="alpha-bar" id="alpha-bar"></div>
    <div class="list-header">
      <div class="list-letter" id="list-letter">A</div>
      <div class="list-count" id="list-count"></div>
    </div>
    <div class="cineaste-list" id="cineaste-list"></div>
  </div>

  <div class="page" id="page-contributeurs">
    <div class="list-header" style="margin-bottom:1.5rem">
      <div class="list-letter" style="font-size:44px;font-weight:400;color:var(--text)">Contributeurs</div>
      <div class="list-count" id="contrib-count"></div>
    </div>
    <div class="contrib-list" id="contrib-list"></div>
  </div>

  <div class="page" id="page-statistiques">
    <div class="list-header" style="margin-bottom:1.5rem">
      <div class="list-letter" style="font-size:44px;font-weight:400;color:var(--text)">Statistiques</div>
    </div>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="ranking-section">
      <div class="ranking-title">Cinéastes les plus topés</div>
      <div id="ranking-cineastes"></div>
    </div>
    <div class="ranking-section">
      <div class="ranking-title">Contributeurs</div>
      <div id="ranking-contributeurs"></div>
    </div>
  </div>
</div>

<div class="fiche-overlay" id="fiche-overlay" onclick="if(event.target===this)closeFiche()">
  <div class="fiche" id="fiche-content"></div>
</div>

<div class="footer">TOPS — CINEASTES</div>

<script>
var DATA = null;
var currentLetter = 'A';

var FAVORIS = {
  'BASTIEN TEKLOW':      ['Pier Paolo Pasolini', 'Quentin Tarantino', 'Apichatpong Weerasethakul'],
  'CLEMENT GUIBOREL':    ['Yasujiro Ozu', 'Andrei Tarkovsky', 'Robert Bresson'],
  'DANIEL JIRDEN':       ['Yasujiro Ozu', 'Robert Bresson', 'Michael Snow'],
  'FRANKY FOCKERS':      ['Brian De Palma', 'Alfred Hitchcock', 'Pier Paolo Pasolini'],
  'FREDERIC GUEZ':       ['Brian De Palma', 'Jean-Luc Godard', 'Clint Eastwood'],
  'GREGORY LESCARD':     ['Eric Rohmer', 'Michael Mann', 'Michelangelo Antonioni'],
  'KEEFE MURPHY':        ['Robert Bresson', 'Kenji Mizoguchi', 'Yasujiro Ozu'],
  'MATHIEU MUZARD':      ['Robert Bresson', 'Jean-Marie Straub & Danièle Huillet', 'Kenji Mizoguchi'],
  'SIMONE ROGHI':        ['Andrei Tarkovsky', 'Robert Bresson', 'Danièle Huillet & Jean-Marie Straub'],
  'THIERRY JOUSSE':      ['Jean-Luc Godard', 'Kenji Mizoguchi', 'Vincente Minnelli'],
  'THOMAS DEMAEREL':     ['John Carpenter', 'Brian De Palma', 'Dario Argento'],
  'THORACENTESE RUBIS':  ['Andrei Tarkovsky', 'Kenji Mizoguchi', 'Robert Bresson'],
  'VINZ J. ORLOV':       ['David Lynch', 'Woody Allen', 'Jean-Luc Godard'],
};

fetch('cineastes.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    DATA = data;
    DATA.cineastes.forEach(function(c) {
      if (c.tops_contributeurs) {
        c.tops_contributeurs = c.tops_contributeurs.map(function(t) {
          if (t === 'MAT' || t === 'MAT ') return 'MATHIEU MUZARD';
          if (t === 'THOMAS F. FLAVIER') return 'THOMAS FLAVIER';
          return t;
        });
      }
    });
    init();
  })
  .catch(function() {
    document.getElementById('cineaste-list').innerHTML =
      '<div class="empty-msg">Erreur de chargement. Vérifiez que cineastes.json est présent.</div>';
  });

function init() {
  buildAlpha();
  selectLetter('A');
}

function toTitleCase(str) {
  return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
}

function formatContribNamePlain(name) {
  var parts = name.trim().split(' ');
  if (parts.length === 1) return parts[0];
  var nom = parts[parts.length - 1];
  var prenom = parts.slice(0, -1).map(toTitleCase).join(' ');
  return prenom + ' ' + nom;
}

function formatContribName(name) {
  // Sépare le dernier mot comme NOM de famille (en bordeaux)
  var parts = name.trim().split(' ');
  if (parts.length === 1) return '<span class="contrib-nom">' + parts[0] + '</span>';
  var nom = parts[parts.length - 1];
  var prenom = parts.slice(0, -1).map(toTitleCase).join(' ');
  return '<span class="contrib-prenom">' + prenom + '</span> <span class="contrib-nom">' + nom + '</span>';
}

function formatNom(nom) {
  if (nom.includes(',')) {
    var idx = nom.indexOf(',');
    return '<b>' + nom.slice(0, idx) + '</b>' + nom.slice(idx);
  }
  return '<b>' + nom + '</b>';
}

function formatDateSimple(naissance, deces, vivant) {
  if (!naissance) return '';
  if (deces) return naissance + '\u2013' + deces;
  if (vivant) return String(naissance);
  return String(naissance);
}

function formatDates(c) {
  if (c.provisoire) return '(fiche provisoire)';
  if (c.duo && Array.isArray(c.naissance)) {
    var d1 = formatDateSimple(c.naissance[0], c.deces[0], c.vivant[0]);
    var d2 = formatDateSimple(c.naissance[1], c.deces[1], c.vivant[1]);
    if (d1 || d2) return (d1 || '?') + '\u2002/\u2002' + (d2 || '?');
    return '';
  }
  return formatDateSimple(c.naissance, c.deces, c.vivant);
}

function navigate(page) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('visible'); });
  document.getElementById('page-' + page).classList.add('visible');
  document.querySelectorAll('.nav a').forEach(function(a) { a.classList.remove('active'); });
  document.getElementById('nav-' + page).classList.add('active');
  if (page === 'contributeurs') renderContributeurs();
  if (page === 'statistiques') renderStatistiques();
  window.scrollTo(0, 0);
}

function getLetterData(letter) {
  if (!DATA) return [];
  return DATA.cineastes.filter(function(c) {
    return c.nom.charAt(0).toUpperCase() === letter;
  });
}

function buildAlpha() {
  var bar = document.getElementById('alpha-bar');
  bar.innerHTML = '';
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(function(l) {
    var s = document.createElement('span');
    s.textContent = l;
    if (getLetterData(l).length > 0) {
      s.classList.add('has-data');
      s.onclick = function() { selectLetter(l); };
    } else {
      s.classList.add('no-data');
    }
    if (l === currentLetter) s.classList.add('active');
    bar.appendChild(s);
  });
}

function selectLetter(l) {
  currentLetter = l;
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.alpha-bar span').forEach(function(s) {
    s.classList.toggle('active', s.textContent === l);
  });
  var items = getLetterData(l);
  items.sort(function(a, b) { return a.nom.localeCompare(b.nom, 'fr'); });
  renderList(items);
  document.getElementById('list-letter').textContent = l;
}

function renderList(items) {
  var list = document.getElementById('cineaste-list');
  var count = document.getElementById('list-count');
  list.innerHTML = '';
  if (!items.length) {
    list.innerHTML = '<div class="empty-msg">Aucun résultat</div>';
    count.textContent = '';
    return;
  }
  count.textContent = items.length + ' cin\u00e9aste' + (items.length > 1 ? 's' : '');
  items.forEach(function(c) {
    var row = document.createElement('div');
    row.className = 'cineaste-row';
    var dates = formatDates(c);
    var datesHtml = dates ? '<span class="c-dates">' + dates + '</span>' : '';
    var nb = c.tops_contributeurs ? c.tops_contributeurs.length : 0;
    row.innerHTML = '<div><span class="c-name">' + formatNom(c.nom) + '</span>' + datesHtml + '</div>' +
      '<div class="c-badge">' + nb + ' top' + (nb > 1 ? 's' : '') + '</div>';
    row.onclick = function() { openFiche(c); };
    list.appendChild(row);
  });
}

function filterList() {
  var q = document.getElementById('search-input').value.toLowerCase().trim();
  if (!q) { selectLetter(currentLetter); return; }
  var results = DATA.cineastes.filter(function(c) {
    return c.nom.toLowerCase().indexOf(q) !== -1;
  });
  results.sort(function(a, b) { return a.nom.localeCompare(b.nom, 'fr'); });
  document.getElementById('list-letter').textContent = '';
  document.querySelectorAll('.alpha-bar span').forEach(function(s) { s.classList.remove('active'); });
  renderList(results);
}

function openFiche(c) {
  var nb = c.tops_contributeurs ? c.tops_contributeurs.length : 0;
  var contribsHtml = nb > 0
    ? c.tops_contributeurs.map(function(t) {
        return '<span class="contrib-tag" onclick="event.stopPropagation();openContribDetail(\'' + t.replace(/'/g, "\\'") + '\')">' + t + '</span>';
      }).join('')
    : '<div class="empty-msg">Aucun top posté pour ce cinéaste</div>';

  var fbHtml = c.url_facebook
    ? '<a class="fiche-fb-link" href="' + c.url_facebook + '" target="_blank">Voir la fiche sur Facebook &#8599;</a>'
    : '';

  document.getElementById('fiche-content').innerHTML =
    '<div class="fiche-back" onclick="closeFiche()">\u2190 Retour</div>' +
    '<div class="fiche-name">' + formatNom(c.nom) + '</div>' +
    '<div class="fiche-dates">' + formatDates(c) + '</div>' +
    '<div class="fiche-stat"><div class="fiche-stat-number">' + nb + '</div><div class="fiche-stat-label">tops postés</div></div>' +
    '<div class="fiche-section">Tops postés par</div>' +
    '<div class="contrib-grid">' + contribsHtml + '</div>' +
    fbHtml;

  document.getElementById('fiche-overlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function closeFiche() {
  document.getElementById('fiche-overlay').classList.remove('visible');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeFiche();
});

function renderContributeurs() {
  if (!DATA) return;
  var list = document.getElementById('contrib-list');
  var count = document.getElementById('contrib-count');

  var contribs = DATA.contributeurs
    .filter(function(contrib) {
      var n = (contrib.prenom + (contrib.nom ? ' ' + contrib.nom : '')).trim();
      return n !== 'version 22.8' && n !== '';
    })
    .map(function(contrib) {
      var displayName = (contrib.prenom + (contrib.nom ? ' ' + contrib.nom : '')).trim();
      var nb = 0;
      DATA.cineastes.forEach(function(c) {
        if (c.tops_contributeurs && c.tops_contributeurs.indexOf(displayName) !== -1) nb++;
      });
      return { name: displayName, tops: nb };
    });
  contribs.sort(function(a, b) { return b.tops - a.tops; });
  count.textContent = contribs.length + ' contributeurs';
  count.style.fontSize = '20px';
  count.style.color = 'var(--text)';
  count.style.fontStyle = 'normal';

  list.innerHTML = contribs.map(function(c, i) {
    var isTop10 = i < 10;
    var favs = FAVORIS[c.name] || [];
    var favsHtml = favs.length
      ? favs.map(function(f) {
          return '<div class="contrib-fav-item"><span class="heart">&#10084;</span>' + f + '</div>';
        }).join('')
      : '';
    var favsSection = favs.length ? '<div class="contrib-card-favs">' + favsHtml + '</div>' : '';
    var rankBadge = isTop10 ? '<span class="contrib-rank-badge">#' + (i+1) + '</span>' : '';
    var cardClass = isTop10 ? 'contrib-card-top' : 'contrib-card';
    return '<div class="' + cardClass + '" onclick="openContribDetail(\'' + c.name.replace(/'/g, "\\'") + '\')">' +
      rankBadge +
      '<div class="contrib-card-name">' + formatContribName(c.name) + '</div>' +
      '<div class="contrib-card-stat">' + c.tops + ' top' + (c.tops > 1 ? 's' : '') + ' postés</div>' +
      favsSection + '</div>';
  }).join('');
}

function openContribDetail(name) {
  var cineastes = DATA.cineastes.filter(function(c) {
    return c.tops_contributeurs && c.tops_contributeurs.indexOf(name) !== -1;
  });
  cineastes.sort(function(a, b) { return a.nom.localeCompare(b.nom, 'fr'); });

  var favs = FAVORIS[name] || [];
  var favsHtml = favs.length
    ? '<div class="fiche-section" style="margin-top:1.5rem;margin-bottom:0.5rem">Cinéastes favoris</div>' +
      '<div class="contrib-grid">' +
      favs.map(function(f) { return '<span class="contrib-tag" style="cursor:default">&#10084; ' + f + '</span>'; }).join('') +
      '</div>'
    : '';

  var listHtml = '<div class="cineaste-list" style="margin-top:1rem">';
  cineastes.forEach(function(c) {
    var dates = formatDates(c);
    var datesHtml = dates ? '<span class="c-dates">' + dates + '</span>' : '';
    listHtml += '<div class="cineaste-row" onclick="closeFiche();var c=DATA.cineastes.find(function(x){return x.fbid===\'' + c.fbid + '\'});if(c)openFiche(c)">' +
      '<span class="c-name">' + formatNom(c.nom) + '</span>' + datesHtml + '</div>';
  });
  listHtml += '</div>';

  document.getElementById('fiche-content').innerHTML =
    '<div class="fiche-back" onclick="closeFiche()">\u2190 Retour</div>' +
    '<div class="fiche-name" style="font-size:32px">' + name + '</div>' +
    '<div class="fiche-dates" style="font-style:italic">' + cineastes.length + ' top' + (cineastes.length > 1 ? 's' : '') + ' postés</div>' +
    favsHtml +
    '<div class="fiche-section" style="margin-top:1.5rem">Cinéastes classés</div>' +
    listHtml;

  document.getElementById('fiche-overlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function renderStatistiques() {
  if (!DATA) return;

  var totalCineastes = DATA.cineastes.length;
  var totalContribs = DATA.contributeurs.filter(function(c) {
    var n = (c.prenom + (c.nom ? ' ' + c.nom : '')).trim();
    return n !== 'version 22.8' && n !== '';
  }).length;
  var enActivite = 0, decedes = 0, sansTops = 0, totalTops = 0;

  DATA.cineastes.forEach(function(c) {
    var nb = c.tops_contributeurs ? c.tops_contributeurs.length : 0;
    totalTops += nb;
    if (c.vivant === true) enActivite++;
    if (c.vivant === false) decedes++;
    if (nb === 0) sansTops++;
  });

  document.getElementById('stats-grid').innerHTML =
    mkStat('Cinéastes', totalCineastes) +
    mkStat('Contributeurs', totalContribs) +
    mkStat('Tops postés', totalTops) +
    mkStat('En activité', enActivite) +
    mkStat('Décédés', decedes) +
    mkStat('Sans tops', sansTops);

  var ranked = DATA.cineastes.slice().sort(function(a, b) {
    return (b.tops_contributeurs ? b.tops_contributeurs.length : 0) -
           (a.tops_contributeurs ? a.tops_contributeurs.length : 0);
  }).slice(0, 25);

  document.getElementById('ranking-cineastes').innerHTML = ranked.map(function(c, i) {
    var nb = c.tops_contributeurs ? c.tops_contributeurs.length : 0;
    return '<div class="ranking-row" onclick="navigate(\'index\');setTimeout(function(){var x=DATA.cineastes.find(function(y){return y.fbid===\'' + c.fbid + '\'});if(x)openFiche(x)},100)">' +
      '<div class="ranking-rank">' + (i+1) + '.</div>' +
      '<div class="ranking-name">' + formatNom(c.nom) + '</div>' +
      '<div class="ranking-value">' + nb + ' tops</div></div>';
  }).join('');

  var contribMap = {};
  DATA.contributeurs.forEach(function(contrib) {
    var n = (contrib.prenom + (contrib.nom ? ' ' + contrib.nom : '')).trim();
    if (n !== 'version 22.8' && n !== '') contribMap[n] = 0;
  });
  DATA.cineastes.forEach(function(c) {
    if (c.tops_contributeurs) {
      c.tops_contributeurs.forEach(function(name) {
        if (contribMap[name] !== undefined) contribMap[name]++;
      });
    }
  });
  var contribRanked = Object.keys(contribMap).map(function(n) {
    return { name: n, tops: contribMap[n] };
  }).sort(function(a, b) { return b.tops - a.tops; });

  document.getElementById('ranking-contributeurs').innerHTML = contribRanked.map(function(c, i) {
    return '<div class="ranking-row" onclick="navigate(\'contributeurs\');setTimeout(function(){openContribDetail(\'' + c.name.replace(/'/g, "\\'") + '\')},100)">' +
      '<div class="ranking-rank">' + (i+1) + '.</div>' +
      '<div class="ranking-name">' + formatContribNamePlain(c.name) + '</div>' +
      '<div class="ranking-value">' + c.tops + ' tops</div></div>';
  }).join('');
}

function mkStat(label, value) {
  return '<div class="stat-card"><div class="stat-card-label">' + label + '</div><div class="stat-card-value">' + value + '</div></div>';
}
</script>
</body>
</html>
